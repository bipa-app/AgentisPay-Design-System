name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm --filter @bipa/tokens build

      - name: Type-check ui-web
        run: pnpm --filter @bipa/ui-web check

      - name: Build Storybook
        run: pnpm --filter @bipa/ui-web build-storybook
        env:
          NODE_OPTIONS: --max-old-space-size=4096
